<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # legacy 内部ファイル / 機密 / ランタイム は Web からアクセス不可
    <Directory /var/www/html/back>
        Require all denied
    </Directory>

    <Directory /var/www/html/storage>
        Require all denied
    </Directory>

    <Directory /var/www/html/vendor>
        Require all denied
    </Directory>

    <Directory /var/www/html/src>
        Require all denied
    </Directory>

    <Directory /var/www/html/tests>
        Require all denied
    </Directory>

    <Directory /var/www/html/migrations>
        Require all denied
    </Directory>

    <Directory /var/www/html/docs>
        Require all denied
    </Directory>

    <Directory /var/www/html/bin>
        Require all denied
    </Directory>

    <Directory /var/www/html/.git>
        Require all denied
    </Directory>

    <Files ~ "^\.">
        Require all denied
    </Files>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # セキュリティヘッダー
    <IfModule mod_headers.c>
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-Frame-Options "SAMEORIGIN"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
    </IfModule>
</VirtualHost>
