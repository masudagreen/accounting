<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    # DocumentRoot is switched to /public per ADR-001 so the legacy /back tree
    # is no longer web-reachable and only the new entry points are served.
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Defence in depth: even with a mis-configured DocumentRoot, deny direct
    # access to the legacy sources and runtime storage.
    <Directory /var/www/html/back>
        Require all denied
    </Directory>

    <Directory /var/www/html/storage>
        Require all denied
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
    LogLevel warn

    # Baseline security headers. CSP is intentionally deferred to Phase 3 where
    # the REST API lands; here we only set headers that cannot break old UI.
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
</VirtualHost>
