services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: accounting_app
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      # vendor/ is baked into the image by `composer install` during build.
      # This named volume shields it from the bind mount above so the host's
      # (gitignored, possibly empty) vendor/ does not hide the installed deps.
      - app_vendor:/var/www/html/vendor
      - app_storage_logs:/var/www/html/storage/logs
      - app_storage_cache:/var/www/html/storage/cache
      - app_storage_receipts:/var/www/html/storage/receipts
      - app_storage_uploads:/var/www/html/storage/uploads
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT_INTERNAL: "3306"
      DB_NAME: ${DB_NAME:-rucaro}
      DB_USER: ${DB_USER:-rucaro}
      DB_PASSWORD: ${DB_PASSWORD:-rucaro}
      TZ: ${TZ:-Asia/Tokyo}
    depends_on:
      db:
        condition: service_healthy
    networks: [accounting]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  db:
    image: mariadb:10.11-jammy
    container_name: accounting_db
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_DATABASE: ${DB_NAME:-rucaro}
      MYSQL_USER: ${DB_USER:-rucaro}
      MYSQL_PASSWORD: ${DB_PASSWORD:-rucaro}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: ${TZ:-Asia/Tokyo}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [accounting]
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: accounting_pma
    profiles: [dev]
    ports:
      - "${PMA_PORT:-8081}:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      UPLOAD_LIMIT: 256M
    depends_on:
      db:
        condition: service_healthy
    networks: [accounting]
    restart: unless-stopped

volumes:
  db_data:
  app_vendor:
  app_storage_logs:
  app_storage_cache:
  app_storage_receipts:
  app_storage_uploads:

networks:
  accounting:
    driver: bridge
